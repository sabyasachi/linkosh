name: Build Chrome extension

on:
  workflow_dispatch:
  push:
    branches:
      - build-process
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install development dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package extension ZIP
        id: package
        shell: bash
        run: |
          version="$(node -p "JSON.parse(require('node:fs').readFileSync('src/manifest.json', 'utf8')).version")"
          archive="linkosh-chrome-v${version}.zip"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match manifest version ${version}." >&2
            exit 1
          fi

          (cd dist/src && zip -q -r "${GITHUB_WORKSPACE}/${archive}" .)
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"
          echo "artifact=linkosh-chrome-v${version}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: dist/src/
          if-no-files-found: error

      - name: Attach ZIP to GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ARCHIVE}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${ARCHIVE}" --verify-tag --generate-notes --title "Linkosh ${GITHUB_REF_NAME}"
          fi
