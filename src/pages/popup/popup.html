<!doctype html>
<!-- The action popup. An empty shell: all markup is rendered by the shared
     Preact tree (app.tsx), mounted by main.js — page.html mounts the exact
     same tree, so there is no duplicated markup to keep in sync. -->
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <script type="module" src="main.js"></script>
  </head>
  <body class="popup"></body>
</html>
